name: Build OpenClaw (Linux Real)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential cmake git zip \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libtinyxml2-dev zlib1g-dev

    - name: Clone OpenClaw
      run: |
        git clone https://github.com/pjasicek/OpenClaw.git openclaw-src

    - name: Build OpenClaw
      run: |
        cd openclaw-src
        mkdir build
        cd build
        cmake ..
        make -j$(nproc)

    - name: Prepare release
      run: |
        mkdir release
        cp -r openclaw-src/build/* release/

    - name: Zip binary
      run: |
        cd release
        zip -r openclaw-linux.zip .

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.1.${{ github.run_number }}
        name: OpenClaw Linux Build v1.1.${{ github.run_number }}
        files: release/openclaw-linux.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

