name: Multi-Platform Build & Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:

  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: echo "Linux OK"

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - run: echo "Windows OK"

  android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: echo "Android OK"

  web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: echo "Web OK"

  release:
    needs: [linux, windows, android, web]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install zip
      run: sudo apt install -y zip

    - name: Create file
      run: |
        mkdir release
        echo "SUCCESS BUILD" > release/info.txt

    - name: Zip
      run: |
        cd release
        zip -r openclaw.zip .

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Auto Release v1.0.${{ github.run_number }}
        files: release/openclaw.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

